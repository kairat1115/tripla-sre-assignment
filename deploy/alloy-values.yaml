alloy:
  configMap:
    content: |
      // ── Logs ────────────────────────────────────────────────────────────────

      discovery.kubernetes "app_pods" {
        role = "pod"
        namespaces {
          names = ["terraform-parse-service"]
        }
      }

      discovery.relabel "app_pods" {
        targets = discovery.kubernetes.app_pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_instance"]
          regex         = "terraform-parse-service"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          regex         = "app"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
      }

      loki.source.kubernetes "app_logs" {
        targets    = discovery.relabel.app_pods.output
        forward_to = [loki.process.app.receiver]
      }

      loki.process "app" {
        forward_to = [loki.write.default.receiver]

        stage.json {
          expressions = {
            trace_id = "trace_id",
            level    = "level",
          }
        }
        stage.labels {
          values = {
            trace_id = "trace_id",
            level    = "level",
          }
        }
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

      // ── Metrics ─────────────────────────────────────────────────────────────
      // Istio overwrites prometheus.io/* pod annotations with its own envoy stats.
      // Scrape the app metrics port directly instead of relying on annotations.

      discovery.kubernetes "app_metrics" {
        role = "pod"
        namespaces {
          names = ["terraform-parse-service"]
        }
      }

      discovery.relabel "app_metrics" {
        targets = discovery.kubernetes.app_metrics.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_instance"]
          regex         = "terraform-parse-service"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_ip"]
          target_label  = "__address__"
          replacement   = "$1:9091"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
      }

      prometheus.scrape "app" {
        targets         = discovery.relabel.app_metrics.output
        forward_to      = [prometheus.remote_write.default.receiver]
        scrape_interval = "15s"
        metrics_path    = "/metrics"
      }

      prometheus.remote_write "default" {
        endpoint {
          url = "http://prometheus-server.monitoring.svc.cluster.local/api/v1/write"
        }
      }

      // ── Traces ───────────────────────────────────────────────────────────────

      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.monitoring.svc.cluster.local:4317"
          tls {
            insecure = true
          }
        }
      }

  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP

controller:
  type: daemonset

rbac:
  create: true

serviceAccount:
  create: true
