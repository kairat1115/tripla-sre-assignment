app:
  image:
    repository: terraform-parse-service
    pullPolicy: IfNotPresent

  configMaps:
    - name: config
      data:
        config.yaml:
          listen_addr: ":8080"
          environment: "production"
          version: "production"
          logger:
            level: "info"
          tracing:
            exporter: "otlp_grpc"
            endpoint: "alloy.monitoring.svc.cluster.local:4317"
            insecure: true
            sample_ratio: 1.0
          metrics:
            addr: ":9091"
          providers:
            aws:
              templates_dir: "/templates/aws"
              storage_dir: "/output/aws"
