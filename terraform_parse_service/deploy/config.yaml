listen_addr: ":8080"
environment: "${ENVIRONMENT:development}"
version: "${VERSION:dev}"
logger:
  level: "info"
tracing:
  exporter: "otlp_grpc"
  endpoint: "alloy:4317"
  insecure: true
  sample_ratio: 1.0
metrics:
  addr: ":9091"
providers:
  aws:
    templates_dir: "/templates/aws"
    templates_poll_interval: "5s"
    storage_dir: "/output/aws"
