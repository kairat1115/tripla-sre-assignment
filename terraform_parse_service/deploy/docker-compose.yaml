name: terraform-parse-service

services:
  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/etc/server/config.yaml:ro
      - ../templates:/templates:ro
      - output:/output
    environment:
      CONFIG_PATH: /etc/server/config.yaml
    read_only: true
    depends_on:
      alloy:
        condition: service_started
    networks:
      - obs

  alloy:
    image: grafana/alloy:v1.17.1
    command: ["run", "--server.http.listen-addr=0.0.0.0:12345", "/etc/alloy/config.alloy"]
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "4317:4317"
    depends_on:
      - tempo
      - loki
      - prometheus
      - prometheus-init
    networks:
      - obs

  tempo:
    image: grafana/tempo:3.0.2
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/config.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - obs

  loki:
    image: grafana/loki:3.7.3
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - obs

  prometheus-init:
    image: busybox
    command: ["chown", "-R", "65534:65534", "/prometheus"]
    volumes:
      - prometheus-data:/prometheus
    networks:
      - obs

  prometheus:
    image: prom/prometheus:v3.12.0-distroless
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    depends_on:
      prometheus-init:
        condition: service_completed_successfully
    networks:
      - obs

  grafana:
    image: grafana/grafana:13.0.3-distroless-slim
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - tempo
      - loki
      - prometheus
    networks:
      - obs

volumes:
  output:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:

networks:
  obs:
    driver: bridge
