{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "app.fullname" . }}-sidecar
  labels:
    {{- include "app.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "app.fullname" . }}-sidecar
subjects:
  - kind: ServiceAccount
    name: {{ if .Values.app.serviceAccount.create }}{{ default (include "app.fullname" .) .Values.app.serviceAccount.name }}{{ else }}{{ default "default" .Values.app.serviceAccount.name }}{{ end }}
    namespace: {{ .Release.Namespace }}
{{- end }}
