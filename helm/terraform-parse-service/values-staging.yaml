app:
  replicaCount: 1
  serviceAccount:
    create: true
  automountServiceAccountToken: true
  env:
    - name: APP_ENV
      value: "staging"
  hpa:
    enabled: false
    # NOTE: because application does not support scaling with replicas, disable them
    # enabled: true
    # minReplicas: 1
    # maxReplicas: 2
    # targetCPUUtilizationPercentage: 60
  configMaps:
    - name: config
      data:
        config.yaml:
          listen_addr: ":8080"
          service_name: "terraform-parse-service"
          environment: "staging"
          version: '{{ .Values.image.tag }}'
          logger:
            level: "info"
          tracing:
            exporter: "otlp_grpc"
            endpoint: "alloy.monitoring.svc.cluster.local:4317"
            insecure: true
            sample_ratio: 0.5
          metrics:
            addr: ":9091"
          providers:
            aws:
              templates_dir: "/templates/aws"
              templates_poll_interval: "5s"
              storage_dir: "/output/aws"

gateway:
  istio:
    virtualService:
      hosts:
        - "terraform-parse-service.staging.example.com"

tfTemplates:
  - aws/s3/bucket.tf.tmpl
