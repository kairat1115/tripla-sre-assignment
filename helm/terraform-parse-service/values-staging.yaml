app:
  replicaCount: 1
  serviceAccount:
    create: true
  automountServiceAccountToken: true
  env:
    - name: OTEL_SERVICE_NAME
      value: "terraform-parse-service"
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: 'deployment.environment.name=staging,service.version={{ .Values.image.tag }}'
    - name: OTEL_TRACES_EXPORTER
      value: "otlp"
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://alloy.monitoring.svc.cluster.local:4317"
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: "grpc"
    - name: OTEL_TRACES_SAMPLER
      value: "parentbased_traceidratio"
    - name: OTEL_TRACES_SAMPLER_ARG
      value: "0.5"
  hpa:
    enabled: false
    # NOTE: because application does not support scaling with replicas, disable them
    # enabled: true
    # minReplicas: 1
    # maxReplicas: 2
    # targetCPUUtilizationPercentage: 60
  configMaps:
    - name: config
      data:
        config.yaml:
          listen_addr: ":8080"
          service_name: "terraform-parse-service"
          environment: "staging"
          version: '{{ .Values.image.tag }}'
          logger:
            level: "info"
          metrics:
            addr: ":9091"
          providers:
            aws:
              templates_dir: "/templates/aws"
              templates_poll_interval: "5s"
              storage_dir: "/output/aws"

gateway:
  istio:
    virtualService:
      hosts:
        - "terraform-parse-service.staging.example.com"

tfTemplates:
  - aws/s3/bucket.tf.tmpl
