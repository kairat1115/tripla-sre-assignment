app:
  replicaCount: 1
  serviceAccount:
    create: true
  automountServiceAccountToken: true
  env:
    - name: APP_ENV
      value: "staging"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 60
  configMaps:
    - name: config
      data:
        config.yaml:
          listen_addr: ":8080"
          environment: "staging"
          version: "staging"
          logger:
            level: "info"
            metadata:
              service: "terraform-parse-service"
              env: "staging"
          tracing:
            exporter: "otlp_grpc"
            endpoint: "tempo.monitoring.svc.cluster.local:4317"
            insecure: true
            sample_ratio: 0.5
          metrics:
            addr: ":9091"
          providers:
            aws:
              templates_dir: "/templates/aws"
              storage_dir: "/output/aws"

gateway:
  istio:
    virtualService:
      hosts:
        - "terraform-parse-service.staging.example.com"

tfTemplates:
  - aws/s3/bucket.tf.tmpl
  - aws/s3/rds.tf.tmpl
