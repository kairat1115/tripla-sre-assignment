suite: terraform-parse-service configmap-templates
templates:
  - templates/configmap-templates.yaml
tests:
  - it: renders zero documents when tfTemplates is empty
    set:
      tfTemplates: []
    asserts:
      - hasDocuments:
          count: 0

  - it: renders one ConfigMap for a single entry
    set:
      tfTemplates[0]: aws/s3/bucket.tf.tmpl
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap

  - it: ConfigMap name equals release-aws-s3-bucket-tf-tmpl-tmpl
    set:
      tfTemplates[0]: aws/s3/bucket.tf.tmpl
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-aws-s3-bucket-tf-tmpl-tmpl

  - it: ConfigMap carries terraform-parse-service/template label
    set:
      tfTemplates[0]: aws/s3/bucket.tf.tmpl
    asserts:
      - equal:
          path: metadata.labels["terraform-parse-service/template"]
          value: "true"

  - it: ConfigMap data key equals the relative path
    set:
      tfTemplates[0]: aws/s3/bucket.tf.tmpl
    asserts:
      - isNotEmpty:
          path: data["aws/s3/bucket.tf.tmpl"]

  - it: ConfigMap data value is non-empty
    set:
      tfTemplates[0]: aws/s3/bucket.tf.tmpl
    asserts:
      - isNotEmpty:
          path: data["aws/s3/bucket.tf.tmpl"]

  - it: two entries render two documents
    values:
      - fixtures/two-templates.yaml
    asserts:
      - hasDocuments:
          count: 2

  - it: aws/s3/rds.tf.tmpl produces correct CM name
    set:
      tfTemplates[0]: aws/s3/rds.tf.tmpl
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-aws-s3-rds-tf-tmpl-tmpl
