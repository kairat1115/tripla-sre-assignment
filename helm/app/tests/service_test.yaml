suite: app service
templates:
  - templates/service.yaml
tests:
  - it: renders a Service with default values
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: http
      - equal:
          path: spec.ports[0].protocol
          value: TCP
      - equal:
          path: spec.ports[0].name
          value: http

  - it: reflects custom service port
    set:
      service.port: 8080
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080

  - it: reflects custom service type
    set:
      service.type: NodePort
    asserts:
      - equal:
          path: spec.type
          value: NodePort

  - it: selector contains release name as instance label
    release:
      name: myapp
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: myapp

  - it: selector app name reflects nameOverride
    set:
      nameOverride: my-service
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: my-service
