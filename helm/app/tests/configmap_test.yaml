suite: app configmap
templates:
  - templates/configmap.yaml
tests:
  - it: renders zero documents when configMaps is empty
    asserts:
      - hasDocuments:
          count: 0

  - it: renders one ConfigMap for a single entry
    values:
      - fixtures/configmaps.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-config
      - isNotEmpty:
          path: data["config.yaml"]

  - it: carries standard Helm labels
    values:
      - fixtures/configmaps.yaml
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: renders two ConfigMaps for two entries
    values:
      - fixtures/two-configmaps.yaml
    asserts:
      - hasDocuments:
          count: 2
