replicaCount: 1

image:
  repository: hashicorp/http-echo
  tag: "0.2.3"
  pullPolicy: IfNotPresent

args:
  - "-text=hello"

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "150m"
    memory: "128Mi"

probes:
  type: httpGet
  readiness:
    path: /
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 20

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 0
