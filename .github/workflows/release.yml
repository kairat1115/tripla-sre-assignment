name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/terraform-parse-service

jobs:
  quality:
    name: quality
    uses: ./.github/workflows/ci.yml

  service:
    name: service (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: terraform_parse_service/go.mod
          cache-dependency-path: terraform_parse_service/go.sum

      - name: Build service
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          ARCH="${{ matrix.arch }}"
          DIST_DIR="dist"
          SERVER_DIR="${DIST_DIR}/server-${ARCH}"

          mkdir -p "${SERVER_DIR}"

          (
            cd terraform_parse_service
            CGO_ENABLED=0 GOOS=linux GOARCH="${ARCH}" go build \
              -trimpath \
              -ldflags "-s -w" \
              -o "../${SERVER_DIR}/terraform-parse-service-server" \
              ./cmd/server
          )

          cp -R terraform_parse_service/configs "${SERVER_DIR}/configs"
          cp -R terraform_parse_service/templates "${SERVER_DIR}/templates"
          tar -C "${SERVER_DIR}" \
            -czf "${DIST_DIR}/terraform-parse-service-server_${VERSION}_linux_${ARCH}.tar.gz" \
            .

      - name: Upload service artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-service-${{ matrix.arch }}
          path: dist/terraform-parse-service-server_*.tar.gz

  helm:
    name: helm
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Package charts
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DIST_DIR="dist"

          mkdir -p "${DIST_DIR}"

          helm dependency update helm/terraform-parse-service

          helm package helm/app \
            --version "${VERSION}" \
            --app-version "${TAG}" \
            --destination "${DIST_DIR}"

          helm package helm/gateway \
            --version "${VERSION}" \
            --app-version "${TAG}" \
            --destination "${DIST_DIR}"

          helm package helm/terraform-parse-service \
            --dependency-update \
            --version "${VERSION}" \
            --app-version "${TAG}" \
            --destination "${DIST_DIR}"

      - name: Upload Helm artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-helm
          path: dist/*.tgz

  terraform:
    name: terraform
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Terraform bundle
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DIST_DIR="dist"

          mkdir -p "${DIST_DIR}"

          (
            cd terraform_parse_service
            zip -r "../${DIST_DIR}/terraform-parse-service-terraform_${VERSION}.zip" templates
          )

      - name: Upload Terraform artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-terraform
          path: dist/terraform-parse-service-terraform_*.zip

  container:
    name: container
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: terraform_parse_service
          file: terraform_parse_service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs:
      - service
      - helm
      - terraform
      - container
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Build checksums
        shell: bash
        run: |
          set -euo pipefail

          (
            cd dist
            find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*
